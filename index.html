<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pocket Tanpura</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#140a00">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tanpura">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        /* Dark Mode (Base) - Vibrant Magenta/Purple Background with Orange Accent */
        :root {
            --bg-base: #0a0305; 
            --shape-1: #e6005c; 
            --shape-2: #6600cc; 
            --text-color: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.85); 
            --accent-color: #ffa500; 
            
            --control-bg: rgba(255, 255, 255, 0.08); /* Increased frost contrast for dark mode */
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            --text-glow: 0 2px 6px rgba(0, 0, 0, 0.95); 
            
            --modal-bg: #1a080f; /* Solid dark color for modal */

            --engrave-shadow: rgba(0, 0, 0, 0.95);
            --engrave-highlight: rgba(255, 165, 0, 0.3);
            
            --btn-top: #ffaa00;
            --btn-bottom: #d47000;
            --btn-depth-color: #8a4800; 
            --btn-playing-top: #d32f2f;
            --btn-playing-bottom: #9a1c1c;
            --btn-playing-depth: #5c0f0f;
            
            --audio-intensity: 0; 
            
            --radius-sm: 14px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --radius-pill: 50px;
        }

        /* Light Mode - Vibrant Palette & Glassmorphic */
        [data-theme="light"] {
            --bg-base: #fcf5f7; 
            --shape-1: #ff3377; 
            --shape-2: #8c33ff; 
            --text-color: #000000;
            --text-muted: rgba(0, 0, 0, 0.7);
            --accent-color: #ff8c00; 
            
            --control-bg: rgba(255, 255, 255, 0.6); 
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            --text-glow: 0 1px 4px rgba(255, 255, 255, 1); 
            
            --modal-bg: #ffffff; /* Solid light color for modal */

            --engrave-shadow: rgba(255, 255, 255, 0.9);
            --engrave-highlight: rgba(0, 0, 0, 0.05);

            --btn-top: #ffaa00;
            --btn-bottom: #cc6600;
            --btn-depth-color: #994d00;
            --btn-playing-top: #d32f2f;
            --btn-playing-bottom: #aa1e1e;
            --btn-playing-depth: #7a1515;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100dvh;
            overflow: hidden;
            overscroll-behavior: none; 
            background-color: var(--bg-base);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.4s ease;
        }

        * { box-sizing: border-box; }

        /* --- BACKGROUND LAYER --- */
        .bg-anim-layer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -3; overflow: hidden; pointer-events: none;
        }

        .drift-container { position: absolute; width: 100%; height: 100%; }
        .mover1 { animation: drift1 18s infinite alternate ease-in-out; }
        .mover2 { animation: drift2 22s infinite alternate-reverse ease-in-out; }

        @keyframes drift1 { 
            0% { transform: translate(-10vw, -10vh) rotate(0deg) scale(0.9); } 
            100% { transform: translate(35vw, 25vh) rotate(45deg) scale(1.5); } 
        }
        @keyframes drift2 { 
            0% { transform: translate(10vw, 10vh) rotate(0deg) scale(1.2); } 
            100% { transform: translate(-30vw, -25vh) rotate(-30deg) scale(0.8); } 
        }

        .bg-shape {
            position: absolute;
            border-radius: 50%;
            transform: scale(calc(1 + var(--audio-intensity) * 0.5));
            transition: transform 0.1s ease-out, opacity 0.1s ease-out;
        }

        .shape1 { 
            width: 75vw; height: 75vw; min-width: 450px; min-height: 450px;
            background: var(--shape-1); filter: blur(120px);
            top: -15%; left: -15%; 
            opacity: calc(0.2 + (var(--audio-intensity) * 0.25)); 
        }
        
        .shape2 { 
            width: 85vw; height: 85vw; min-width: 500px; min-height: 500px;
            background: var(--shape-2); filter: blur(140px);
            bottom: -20%; right: -15%; 
            opacity: calc(0.15 + (var(--audio-intensity) * 0.3)); 
        }

        .bg-vignette {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, transparent 10%, rgba(0,0,0,0.92) 150%);
            z-index: -1; pointer-events: none; transition: background 0.4s ease;
        }
        [data-theme="light"] .bg-vignette {
            background: radial-gradient(circle at center, transparent 10%, rgba(255,255,255,0.75) 150%);
        }

        /* --- MAIN APP CONTAINER --- */
        .app-container {
            width: 100%;
            max-width: 450px; 
            height: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: space-between; 
            /* Removed large bottom padding, keeping only safe-area for mobile nav bar */
            padding: max(env(safe-area-inset-top), 4vh) 1.5rem env(safe-area-inset-bottom, 12px);
            z-index: 1;
            position: relative;
            overflow: hidden;
            border: none;
        }

        @media (min-width: 500px) and (min-height: 800px) {
            body { display: flex; align-items: center; justify-content: center; }
            .app-container {
                height: 90vh;
                border-radius: 40px;
                background: rgba(10, 3, 5, 0.3);
                box-shadow: var(--glass-shadow);
                backdrop-filter: blur(40px) saturate(150%);
                -webkit-backdrop-filter: blur(40px) saturate(150%);
                border: none;
            }
            [data-theme="light"] .app-container { background: rgba(255, 250, 240, 0.4); }
        }

        /* HEADER */
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            flex: 0 0 auto;
        }

        h1 { 
            font-weight: 900; 
            letter-spacing: 2px; 
            font-size: 0.8rem; 
            text-transform: uppercase;
            color: var(--accent-color); 
            text-shadow: -1px -1px 2px var(--engrave-shadow), 1px 1px 1px var(--engrave-highlight);
            cursor: default; 
            margin: 0;
        }

        .icon-btn {
            background: transparent; border: none;
            color: var(--text-color); 
            text-shadow: var(--text-glow);
            border-radius: var(--radius-lg);
            width: 44px; height: 44px; 
            display: flex; justify-content: flex-end; align-items: center;
            transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
            cursor: pointer;
        }
        .icon-btn:active { transform: scale(0.85); color: var(--accent-color); }

        /* CONTROLS GRID */
        .controls-grid {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            gap: max(2vh, 12px);
            width: 100%;
            margin-top: max(2vh, 10px);
            margin-bottom: max(2vh, 10px);
            min-height: 0; 
        }

        .top-row-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: max(1.5vh, 12px);
            flex: 0 0 50%; 
            min-height: 0;
        }

        /* Grouped frosted container for bottom controls */
        .bottom-group-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            gap: max(1vh, 8px);
            flex: 1 1 auto; 
            min-height: 0;
            
            background: var(--control-bg);
            border-radius: var(--radius-lg);
            padding: max(2.5vh, 20px) max(3vh, 24px); /* Increased side paddings */
            box-shadow: var(--glass-shadow);
            border: none;
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
        }

        .control-cell {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            justify-content: center;
            min-height: 0;
        }

        .control-cell.full-width { grid-column: 1 / -1; }
        
        /* Unified Labels Styling */
        label { 
            display: block; 
            text-align: center; 
            font-weight: 400; 
            font-size: 0.65rem; 
            letter-spacing: 1px; 
            color: var(--text-color); 
            opacity: 0.6;
            text-transform: none; 
            text-shadow: none; 
        }

        .main-label { margin-bottom: 8px; }
        .sub-label { margin-bottom: 6px; }

        /* FROSTY DYNAMIC HEIGHT CARDS */
        .stepper-card {
            display: flex;
            flex-direction: column; 
            align-items: center;
            justify-content: space-between;
            background: var(--control-bg);
            border: none;
            box-shadow: var(--glass-shadow);
            border-radius: var(--radius-lg);
            padding: 12px 6px;
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            height: 100%; 
            min-height: 0; 
        }
        
        .stepper-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            text-shadow: var(--text-glow);
            font-size: clamp(1.8rem, 4vh, 2.2rem); 
            font-weight: 300;
            cursor: pointer;
            width: 100%; 
            flex: 0 0 auto;
            border-radius: var(--radius-sm);
            transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex; justify-content: center; align-items: center;
        }
        .stepper-btn:active { transform: scale(0.85); color: var(--accent-color); }

        .stepper-display-wrapper {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            flex: 1; width: 100%; position: relative; min-height: 0;
        }

        .pitch-select {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.001; z-index: 2; cursor: pointer; -webkit-appearance: none; border: none;
        }

        .pitch-display {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1; pointer-events: none;
        }

        .pitch-main, .tempo-val {
            color: var(--accent-color);
            text-shadow: 0 2px 4px rgba(0,0,0,0.7);
            font-size: clamp(1.6rem, 4vh, 2rem);
            font-weight: 900; font-variant-numeric: tabular-nums; line-height: 1;
        }
        [data-theme="light"] .pitch-main, [data-theme="light"] .tempo-val { text-shadow: 0 2px 4px rgba(255,255,255,0.8); }

        .pitch-main sub { font-size: 0.5em; font-weight: 700; vertical-align: baseline; position: relative; top: 0.2em; }
        .pitch-sub { font-size: 0.7rem; color: var(--text-muted); text-shadow: var(--text-glow); margin-top: 6px; font-weight: 600; }

        .horizontal-stepper {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.15); border-radius: var(--radius-sm); 
            padding: 4px; height: 100%; min-height: 0; width: 100%;
            border: none;
        }
        [data-theme="light"] .horizontal-stepper { background: rgba(255,255,255,0.4); border: none; }

        .horizontal-stepper .stepper-btn { width: 40px; height: 100%; font-size: clamp(1.5rem, 3vh, 1.8rem); }
        .horizontal-stepper .stepper-val { 
            font-size: clamp(0.75rem, 1.8vh, 0.9rem); font-weight: 700; 
            color: var(--accent-color); text-shadow: 0 1px 3px rgba(0,0,0,0.8); 
            text-align: center; flex: 1; 
        }
        [data-theme="light"] .horizontal-stepper .stepper-val { text-shadow: 0 1px 2px rgba(255,255,255,1); }

        /* PLAY SECTION & SPEAKER INFO */
        .play-section {
            flex: 0 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .play-btn {
            width: 100%; 
            height: clamp(75px, 10vh, 90px); 
            font-size: 1.5rem; 
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 900; 
            color: #fff;
            
            background: linear-gradient(145deg, var(--btn-top), var(--btn-bottom));
            border: none; 
            border-radius: var(--radius-lg); 
            cursor: pointer; 
            
            box-shadow: 
                0 8px 0 var(--btn-depth-color), 
                0 20px 30px rgba(0,0,0,0.5),
                inset 0 2px 2px rgba(255,255,255,0.25);
                
            transform: translateY(0);
            transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative; overflow: hidden; 
        }
        
        .play-btn:active { 
            transform: translateY(8px); 
            box-shadow: 0 0px 0 var(--btn-depth-color), 0 5px 10px rgba(0,0,0,0.5), inset 0 2px 2px rgba(255,255,255,0.25);
        }
        
        .play-btn.playing { 
            background: linear-gradient(145deg, var(--btn-playing-top), var(--btn-playing-bottom));
            box-shadow: 0 8px 0 var(--btn-playing-depth), 0 20px 30px rgba(0,0,0,0.5), inset 0 2px 2px rgba(255,255,255,0.25);
        }
        
        .play-btn.playing:active { 
            transform: translateY(8px);
            box-shadow: 0 0px 0 var(--btn-playing-depth), 0 5px 10px rgba(0,0,0,0.5), inset 0 2px 2px rgba(255,255,255,0.25);
        }

        #waveCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; mix-blend-mode: screen; opacity: 0.9; }

        .play-content {
            position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; 
            gap: 12px; width: 100%; height: 100%; text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }
        .btn-icon { margin-top: -2px; }

        @keyframes breathe {
            0%, 100% { opacity: 0.4; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.15); }
        }

        .speaker-info {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.6rem; 
            color: var(--text-muted); 
            text-shadow: var(--text-glow);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            padding: 12px; 
            height: auto;
            min-height: 1rem;
            opacity: 0;
            transition: opacity 0.4s ease;
            width: 100%;
            box-sizing: border-box;
        }

        .speaker-icon {
            width: 14px;
            height: 14px;
            margin-right: 6px;
            color: currentColor; 
            animation: breathe 2.5s infinite ease-in-out;
        }

        /* MODAL UI */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            display: flex; justify-content: center; align-items: center;
            z-index: 99999; visibility: hidden; opacity: 0;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .modal-overlay.show { visibility: visible; opacity: 1; }
        
        .modal-content {
            background: var(--modal-bg); 
            border: 1px solid rgba(255,255,255,0.05); border-radius: var(--radius-md); 
            padding: 20px 15px; color: var(--text-color); box-shadow: var(--glass-shadow), 0 20px 50px rgba(0,0,0,0.8);
            position: relative; width: 320px; max-width: 90vw; display: flex; flex-direction: column; gap: 15px;
        }
        [data-theme="light"] .modal-content {
            border: 1px solid rgba(0,0,0,0.05);
        }
        
        .modal-content h2 { text-align: center; color: var(--accent-color); text-shadow: 0 1px 4px rgba(0,0,0,0.8); font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 900; margin-bottom: 5px;}
        [data-theme="light"] .modal-content h2 { text-shadow: 0 1px 3px rgba(255,255,255,1); }

        .close-btn { position: absolute; top: 5px; right: 10px; background: none; border: none; font-size: 1.5rem; color: var(--text-muted); text-shadow: var(--text-glow); cursor: pointer; transition: all 0.2s ease; border-radius: var(--radius-pill); }
        .close-btn:active { color: var(--accent-color); transform: scale(0.85); }
        
        .settings-content label { 
            display: block; 
            text-align: center; 
            margin-bottom: 6px; 
            font-size: 0.65rem; 
            letter-spacing: 1px; 
            color: var(--text-muted); 
            text-shadow: var(--text-glow); 
            text-transform: uppercase; 
            font-weight: 700;
        }
        
        .theme-btn { 
            width: 100%; background: rgba(0,0,0,0.15); color: var(--accent-color); border: none; 
            box-shadow: var(--glass-shadow); border-radius: var(--radius-sm); font-size: 0.85rem; font-weight: 700; height: 45px; cursor: pointer; transition: all 0.2s ease; 
        }
        [data-theme="light"] .theme-btn { background: rgba(255,255,255,0.4); border: none; text-shadow: 0 1px 3px rgba(255,255,255,1); }
        .theme-btn:active { transform: scale(0.96); }

        .credits-section { text-align: center; padding-top: 15px; margin-top: 5px; position: relative; }
        .credits-section::before {
            content: ''; position: absolute; top: 0; left: 10%; width: 80%; height: 1px;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent);
        }
        [data-theme="light"] .credits-section::before { background: linear-gradient(to right, transparent, rgba(0,0,0,0.15), transparent); }
        .credits-section h3 { font-size: 0.9rem; color: var(--text-color); text-shadow: var(--text-glow); margin-bottom: 5px; font-weight: 700; }
        .credits-section p { font-size: 0.7rem; color: var(--text-muted); text-shadow: var(--text-glow); line-height: 1.6; }
        .credits-section .author { font-weight: 700; color: var(--accent-color); margin-top: 6px; }
    </style>
</head>
<body>

<div class="bg-anim-layer">
    <div class="drift-container mover1"><div class="bg-shape shape1"></div></div>
    <div class="drift-container mover2"><div class="bg-shape shape2"></div></div>
</div>

<div class="bg-vignette"></div>

<div class="app-container">
    <div class="header-row">
        <h1 id="appLogo">Pocket Tanpura</h1>
        <button id="settingsMenuBtn" class="icon-btn" title="Settings">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                <circle cx="12" cy="5" r="2.5"></circle>
                <circle cx="12" cy="12" r="2.5"></circle>
                <circle cx="12" cy="19" r="2.5"></circle>
            </svg>
        </button>
    </div>

    <div class="controls-grid">
        
        <div class="top-row-grid">
            <div class="control-cell">
                <label class="main-label">Base pitch</label>
                <div class="stepper-card">
                    <button class="stepper-btn" id="pitchUp">+</button>
                    <div class="stepper-display-wrapper">
                        <select id="pitchSelect" class="pitch-select">
                            <option value="27.50">A0 (Safed 6)</option>
                            <option value="29.14">A#0 (Kali 5)</option>
                            <option value="30.87">B0 (Safed 7)</option>
                            <option value="32.70">C1 (Safed 1)</option>
                            <option value="34.65">C#1 (Kali 1)</option>
                            <option value="36.71">D1 (Safed 2)</option>
                            <option value="38.89">D#1 (Kali 2)</option>
                            <option value="41.20">E1 (Safed 3)</option>
                            <option value="43.65" selected>F1 (Safed 4)</option>
                            <option value="46.25">F#1 (Kali 3)</option>
                            <option value="49.00">G1 (Safed 5)</option>
                            <option value="51.91">G#1 (Kali 4)</option>
                            <option value="55.00">A1 (Safed 6)</option>
                            <option value="58.27">A#1 (Kali 5)</option>
                            <option value="61.74">B1 (Safed 7)</option>
                            <option value="65.41">C2 (Safed 1)</option>
                        </select>
                        <div id="pitchDisplayUI" class="pitch-display">
                            <div id="pitchMainDisplay" class="pitch-main" style="padding-bottom: 16px;">F<sub>1</sub></div>
                            <div id="pitchSubDisplay" class="pitch-sub" style="margin-top: 0;">Safed 4</div>
                        </div>
                    </div>
                    <button class="stepper-btn" id="pitchDown">−</button>
                </div>
            </div>
            
            <div class="control-cell">
                <label class="main-label">Tempo</label>
                <div class="stepper-card">
                    <button class="stepper-btn tempo-btn" data-val="1">+</button>
                    <div class="stepper-display-wrapper">
                        <div class="tempo-val" id="tempoDisplay" style="padding-bottom: 16px;">70</div>
                        <div class="pitch-sub" style="margin-top: 0;">BPM</div>
                    </div>
                    <button class="stepper-btn tempo-btn" data-val="-1">−</button>
                </div>
            </div>
        </div>

        <div class="bottom-group-grid">
            <div class="control-cell">
                <label class="sub-label">First string</label>
                <div class="horizontal-stepper">
                    <button class="stepper-btn" id="fsPrev">‹</button>
                    <span class="stepper-val" id="fsDisplay">Mandra Pa</span>
                    <button class="stepper-btn" id="fsNext">›</button>
                </div>
            </div>

            <div class="control-cell">
                <label class="sub-label">Middle strings</label>
                <div class="horizontal-stepper">
                    <button class="stepper-btn" id="msPrev">‹</button>
                    <span class="stepper-val" id="msDisplay">Shuddha Sa</span>
                    <button class="stepper-btn" id="msNext">›</button>
                </div>
            </div>

            <div class="control-cell">
                <label class="sub-label">Octave</label>
                <div class="horizontal-stepper">
                    <button class="stepper-btn" id="octavePrev">‹</button>
                    <span class="stepper-val" id="octaveDisplay">Madhya</span>
                    <button class="stepper-btn" id="octaveNext">›</button>
                </div>
            </div>

            <div class="control-cell">
                <label class="sub-label">Tone</label>
                <div class="horizontal-stepper">
                    <button class="stepper-btn" id="tonePrev">‹</button>
                    <span class="stepper-val" id="toneDisplay">Rich</span>
                    <button class="stepper-btn" id="toneNext">›</button>
                </div>
            </div>

            <div class="control-cell full-width">
                <label class="sub-label">Rhythm style</label>
                <div class="horizontal-stepper">
                    <button class="stepper-btn" id="rhythmPrev">‹</button>
                    <span class="stepper-val" id="rhythmDisplay">Authentic</span>
                    <button class="stepper-btn" id="rhythmNext">›</button>
                </div>
            </div>
        </div>

    </div>
    
    <div class="play-section">
        <button id="playBtn" class="play-btn">
            <canvas id="waveCanvas"></canvas>
            <div class="play-content">
                <span class="btn-icon">▶</span> <span class="btn-text">Play</span>
            </div>
        </button>
        <div id="speakerInfo" class="speaker-info">
            <svg class="speaker-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
            <span id="speakerName">Default Device</span>
        </div>
    </div>
</div>

<div id="settingsModal" class="modal-overlay">
    <div class="modal-content settings-content">
        <button id="closeSettingsModal" class="close-btn">&times;</button>
        <h2>Settings</h2>
        
        <div class="control-group">
            <label>App theme</label>
            <div class="horizontal-stepper">
                <button class="stepper-btn" id="themePrev">‹</button>
                <span class="stepper-val" id="themeDisplay">Daylight ⏳</span>
                <button class="stepper-btn" id="themeNext">›</button>
            </div>
        </div>

        <div class="control-group" style="margin-top: 10px;">
            <label>Master tune</label>
            <div class="horizontal-stepper">
                <button class="stepper-btn tune-btn" data-val="-1">−</button>
                <span class="stepper-val" id="tuneDisplay">440 Hz</span>
                <button class="stepper-btn tune-btn" data-val="1">+</button>
            </div>
        </div>

        <div class="credits-section">
            <h3>Pocket Tanpura</h3>
            <p class="author">Designed by Bhaskarjyoti Das</p>
            <p>Made in India 🇮🇳</p>
        </div>
    </div>
</div>

<script>
    // --- UI Listeners & Updates ---
    const tuneDisplay = document.getElementById('tuneDisplay');
    const tempoDisplay = document.getElementById('tempoDisplay');
    const pitchSelect = document.getElementById('pitchSelect');
    const pitchMainDisplay = document.getElementById('pitchMainDisplay');
    const pitchSubDisplay = document.getElementById('pitchSubDisplay');

    let currentTempo = 70;
    let masterTuneVal = 440;
    const SAFE_MASTER_VOL = 0.6; // Hardcoded safe volume level to prevent distortion

    // --- Data Arrays for Sub Controls ---
    const fsOptions = [
        {val: 'Pa_lower', text: 'Mandra Pa'},
        {val: 'Ma_lower', text: 'Mandra Ma'},
        {val: 'Ni_lower', text: 'Mandra Ni'}
    ];
    let fsIdx = 0; 

    const msOptions = [
        {val: 'Sa', text: 'Shuddha Sa'},
        {val: 'Re_komal', text: 'Komal Re'},
        {val: 'Re', text: 'Shuddha Re'},
        {val: 'Ga_komal', text: 'Komal Ga'},
        {val: 'Ga', text: 'Shuddha Ga'},
        {val: 'Ma', text: 'Shuddha Ma'},
        {val: 'Ni', text: 'Shuddha Ni'}
    ];
    let msIdx = 0; 

    const octaveOptions = [
        {val: '1', text: 'Kharaj'},
        {val: '2', text: 'Mandra'},
        {val: '4', text: 'Madhya'},
        {val: '8', text: 'Taar'}
    ];
    let octaveIdx = 2; // Defaults to Madhya

    const toneOptions = [
        {val: 'rich', text: 'Rich'},
        {val: 'mellow', text: 'Mellow'},
        {val: 'deep', text: 'Deep'}
    ];
    let toneIdx = 0; 

    const rhythmOptions = [
        {val: 'standard', text: 'Authentic'},
        {val: 'even', text: 'Even Delay'},
        {val: 'fast', text: 'Fast Cycle'}
    ];
    let rhythmIdx = 0; 

    function updateAllSubDisplays() {
        document.getElementById('fsDisplay').innerText = fsOptions[fsIdx].text;
        document.getElementById('msDisplay').innerText = msOptions[msIdx].text;
        document.getElementById('octaveDisplay').innerText = octaveOptions[octaveIdx].text;
        document.getElementById('toneDisplay').innerText = toneOptions[toneIdx].text;
        document.getElementById('rhythmDisplay').innerText = rhythmOptions[rhythmIdx].text;
    }

    function setupCycler(prevId, nextId, arr, getIdx, setIdx) {
        document.getElementById(prevId).addEventListener('click', () => {
            setIdx((getIdx() - 1 + arr.length) % arr.length);
            updateAllSubDisplays();
            saveSettings();
        });
        document.getElementById(nextId).addEventListener('click', () => {
            setIdx((getIdx() + 1) % arr.length);
            updateAllSubDisplays();
            saveSettings();
        });
    }

    setupCycler('fsPrev', 'fsNext', fsOptions, () => fsIdx, (v) => fsIdx = v);
    setupCycler('msPrev', 'msNext', msOptions, () => msIdx, (v) => msIdx = v);
    setupCycler('octavePrev', 'octaveNext', octaveOptions, () => octaveIdx, (v) => octaveIdx = v);
    setupCycler('tonePrev', 'toneNext', toneOptions, () => toneIdx, (v) => toneIdx = v);
    setupCycler('rhythmPrev', 'rhythmNext', rhythmOptions, () => rhythmIdx, (v) => rhythmIdx = v);

    function updateLabels() {
        tuneDisplay.innerText = `${masterTuneVal} Hz`;
        tempoDisplay.innerText = currentTempo;
    }

    let currentBaseFreq = 43.65; // Default to F1

    function updatePitchDisplay() {
        const selectedText = pitchSelect.options[pitchSelect.selectedIndex].text;
        const match = selectedText.match(/^([A-G]#?)(\d)\s*\((.+)\)$/);
        if (match) {
            pitchMainDisplay.innerHTML = `${match[1]}<sub>${match[2]}</sub>`;
            pitchSubDisplay.innerText = match[3];
        } else {
            pitchMainDisplay.innerText = selectedText;
            pitchSubDisplay.innerText = '';
        }
        currentBaseFreq = parseFloat(pitchSelect.value); 
    }

    document.getElementById('pitchUp').addEventListener('click', () => {
        if(pitchSelect.selectedIndex < pitchSelect.options.length - 1) {
            pitchSelect.selectedIndex++;
            updatePitchDisplay();
            saveSettings();
        }
    });
    document.getElementById('pitchDown').addEventListener('click', () => {
        if(pitchSelect.selectedIndex > 0) {
            pitchSelect.selectedIndex--;
            updatePitchDisplay();
            saveSettings();
        }
    });
    pitchSelect.addEventListener('change', () => {
        updatePitchDisplay();
        saveSettings();
    });

    document.querySelectorAll('.tempo-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const change = parseInt(e.target.getAttribute('data-val'));
            currentTempo = Math.max(30, Math.min(130, currentTempo + change));
            updateLabels();
            saveSettings();
        });
    });

    document.querySelectorAll('.tune-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const change = parseInt(e.target.getAttribute('data-val'));
            masterTuneVal = Math.max(432, Math.min(448, masterTuneVal + change));
            updateLabels();
            saveSettings();
        });
    });

    // --- State & Storage ---
    function saveSettings() {
        localStorage.setItem('tanpura_fsIdx', fsIdx);
        localStorage.setItem('tanpura_msIdx', msIdx);
        localStorage.setItem('tanpura_octaveIdx', octaveIdx);
        localStorage.setItem('tanpura_toneIdx', toneIdx);
        localStorage.setItem('tanpura_rhythmIdx', rhythmIdx);
        localStorage.setItem('tanpura_pitchIdx', pitchSelect.selectedIndex);
        localStorage.setItem('tanpura_tempo', currentTempo);
        localStorage.setItem('tanpura_tune', masterTuneVal);
    }

    function loadSettings() {
        if(localStorage.getItem('tanpura_fsIdx') !== null) fsIdx = parseInt(localStorage.getItem('tanpura_fsIdx'));
        if(localStorage.getItem('tanpura_msIdx') !== null) msIdx = parseInt(localStorage.getItem('tanpura_msIdx'));
        if(localStorage.getItem('tanpura_octaveIdx') !== null) octaveIdx = parseInt(localStorage.getItem('tanpura_octaveIdx'));
        if(localStorage.getItem('tanpura_toneIdx') !== null) toneIdx = parseInt(localStorage.getItem('tanpura_toneIdx'));
        if(localStorage.getItem('tanpura_rhythmIdx') !== null) rhythmIdx = parseInt(localStorage.getItem('tanpura_rhythmIdx'));
        if(localStorage.getItem('tanpura_pitchIdx') !== null) pitchSelect.selectedIndex = parseInt(localStorage.getItem('tanpura_pitchIdx'));
        
        if(localStorage.getItem('tanpura_tempo')) currentTempo = parseInt(localStorage.getItem('tanpura_tempo'));
        if(localStorage.getItem('tanpura_tune')) masterTuneVal = parseInt(localStorage.getItem('tanpura_tune'));
        
        updatePitchDisplay();
        updateAllSubDisplays();
        updateLabels(); 
    }

    document.addEventListener('DOMContentLoaded', loadSettings);

    // --- Dynamic Theme Logic (Daylight) ---
    const themes = ['daylight', 'light', 'dark'];
    const themeIcons = { 'daylight': 'Daylight ⏳', 'light': 'Light ☀️', 'dark': 'Dark 🌙' };
    let currentTheme = localStorage.getItem('tanpura-theme') || 'daylight';

    function applyTheme(theme) {
        const hour = new Date().getHours();
        const isDaytime = hour >= 6 && hour < 18;
        
        let actualTheme = theme;
        if (theme === 'daylight') {
            actualTheme = isDaytime ? 'light' : 'dark';
        }

        if (actualTheme === 'light') {
            document.body.setAttribute('data-theme', 'light');
            document.querySelector('meta[name="theme-color"]').setAttribute('content', '#fcf5f7');
        } else {
            document.body.removeAttribute('data-theme');
            document.querySelector('meta[name="theme-color"]').setAttribute('content', '#0a0305');
        }
        document.getElementById('themeDisplay').innerText = themeIcons[theme];
        localStorage.setItem('tanpura-theme', theme);
    }

    document.getElementById('themePrev').addEventListener('click', () => {
        let idx = themes.indexOf(currentTheme);
        if (idx === -1) idx = 0;
        currentTheme = themes[(idx - 1 + themes.length) % themes.length];
        applyTheme(currentTheme);
    });

    document.getElementById('themeNext').addEventListener('click', () => {
        let idx = themes.indexOf(currentTheme);
        if (idx === -1) idx = 0;
        currentTheme = themes[(idx + 1) % themes.length];
        applyTheme(currentTheme);
    });

    applyTheme(currentTheme);

    // --- Modal Logic ---
    const settingsModal = document.getElementById('settingsModal');
    document.getElementById('settingsMenuBtn').addEventListener('click', () => settingsModal.classList.add('show'));
    document.getElementById('closeSettingsModal').addEventListener('click', () => settingsModal.classList.remove('show'));
    settingsModal.addEventListener('click', (e) => { if (e.target === settingsModal) settingsModal.classList.remove('show'); });

    // --- Core Audio Synthesis Engine ---
    let audioCtx, masterGain, analyser, dataArray;
    let reverbGain; 
    let isPlaying = false, timerID;
    let nextNoteTime = 0.0;
    let currentString = 0;
    let wakeLock = null;
    
    // Create a native HTML5 Audio element to hold our stream
    const nativeAudioElement = new Audio();
    nativeAudioElement.playsInline = true; // Crucial for iOS background playback
    
    const ratios = { 
        'Pa_lower': 0.75, 'Ma_lower': 0.6666, 'Ni_lower': 0.9375, 
        'Sa': 1.0, 'Re_komal': 1.0666, 'Re': 1.125, 'Ga_komal': 1.2, 
        'Ga': 1.25, 'Ma': 1.3333, 'Ni': 1.875 
    };

    const pans = [-0.6, 0.4, -0.4, 0.6];

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 128; 
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            // Global Stereo Reverb/Chorus Effect for wide 3D space on speakers
            reverbGain = audioCtx.createGain();
            reverbGain.gain.value = 0.55; 

            const delayL = audioCtx.createDelay();
            delayL.delayTime.value = 0.035; // 35ms left delay
            const feedbackL = audioCtx.createGain();
            feedbackL.gain.value = 0.4;
            
            const delayR = audioCtx.createDelay();
            delayR.delayTime.value = 0.050; // 50ms right delay
            const feedbackR = audioCtx.createGain();
            feedbackR.gain.value = 0.4;

            const filterL = audioCtx.createBiquadFilter();
            filterL.type = 'lowpass';
            filterL.frequency.value = 2500;
            
            const filterR = audioCtx.createBiquadFilter();
            filterR.type = 'lowpass';
            filterR.frequency.value = 2500;

            const merger = audioCtx.createChannelMerger(2);

            // Left Space Routing
            reverbGain.connect(delayL);
            delayL.connect(filterL);
            filterL.connect(feedbackL);
            feedbackL.connect(delayL);
            delayL.connect(merger, 0, 0); 

            // Right Space Routing
            reverbGain.connect(delayR);
            delayR.connect(filterR);
            filterR.connect(feedbackR);
            feedbackR.connect(delayR);
            delayR.connect(merger, 0, 1); 

            merger.connect(masterGain);
            masterGain.connect(analyser);
            
            // Route the audio into a MediaStream instead of the default hardware destination
            const streamDestination = audioCtx.createMediaStreamDestination();
            analyser.connect(streamDestination);
            
            // Attach the live stream to our native HTML5 Audio element
            nativeAudioElement.srcObject = streamDestination.stream;
            
            masterGain.gain.value = SAFE_MASTER_VOL;

            const n = 64; 
            const real = new Float32Array(n);
            const imag = new Float32Array(n);
            
            for (let i = 1; i < n; i++) {
                // Natural acoustic decay curve for string fundamentals
                let amp = 1.0 / Math.pow(i, 1.4); 
                
                if (i === 1) amp = 1.0;   // Fundamental
                if (i === 2) amp = 0.6;   // Octave
                if (i === 3) amp = 0.45;  // Fifth (Very prominent in Tanpura)
                if (i === 4) amp = 0.3;   // Second Octave
                if (i === 5) amp = 0.25;  // Major Third
                
                // Formant peak mapping to naturally simulate the Jivari (buzzing bridge)
                if (i >= 6 && i <= 15) {
                    amp *= 1 + 1.5 * Math.sin(Math.PI * (i - 6) / 9); 
                }
                
                real[i] = amp;
            }
            window.tanpuraWave = audioCtx.createPeriodicWave(real, imag);
        }
    }

    // --- INTEGRATED AIRSTREAM WAVE VISUALIZER LOGIC ---
    const waveCanvas = document.getElementById('waveCanvas');
    const waveCtx = waveCanvas.getContext('2d');
    let waveTime = 0;

    function resizeCanvas() {
        const btnRect = document.getElementById('playBtn').getBoundingClientRect();
        waveCanvas.width = btnRect.width * window.devicePixelRatio;
        waveCanvas.height = btnRect.height * window.devicePixelRatio;
        waveCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
    }
    window.addEventListener('resize', resizeCanvas);
    document.addEventListener('DOMContentLoaded', resizeCanvas);

    function updateAudioVisuals() {
        requestAnimationFrame(updateAudioVisuals); 
        
        let intensity = 0;
        if (isPlaying && analyser) {
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            const len = Math.min(dataArray.length, 30); 
            for(let i = 0; i < len; i++) sum += dataArray[i];
            let avg = sum / len; 
            intensity = Math.min(1, avg / 130); 
            document.documentElement.style.setProperty('--audio-intensity', intensity.toFixed(3));
        } else {
            document.documentElement.style.setProperty('--audio-intensity', '0');
        }

        const w = waveCanvas.offsetWidth;
        const h = waveCanvas.offsetHeight;
        waveCtx.clearRect(0, 0, w, h);
        const centerY = h / 2;
        
        const numWaves = 4;
        for(let j = 0; j < numWaves; j++) {
            waveCtx.beginPath();
            
            const phase = waveTime * (0.8 + j * 0.2) + j * Math.PI / 3;
            const amp = 20 + (intensity * (h / 0.8)) * (1 - j * 0.1); 
            
            const alpha = 0.15 + (intensity * 0.4) + (j === 2 ? 0.2 : 0); 
            waveCtx.strokeStyle = `rgba(255, 165, 0, ${alpha})`;
            waveCtx.lineWidth = j === 2 ? 4 : 2.5;
            
            for(let i = 0; i <= w; i += 4) {
                const normalizedX = i / w;
                const edgeTaper = Math.sin(normalizedX * Math.PI); 
                
                const y = centerY + (Math.sin(normalizedX * 4 + phase) + Math.sin(normalizedX * 8 - phase * 0.5) * 0.3) * amp * edgeTaper;
                
                if(i === 0) waveCtx.moveTo(i, y);
                else waveCtx.lineTo(i, y);
            }
            waveCtx.stroke();
        }
        waveTime += 0.02 + (intensity * 0.06); 
    }
    
    setTimeout(resizeCanvas, 100);
    updateAudioVisuals();

    function playStringScheduled(freq, panValue, startTime) {
        if (!audioCtx) return;
        const toneType = toneOptions[toneIdx].val;

        // Use 3 oscillators for natural chorused thickness of a thick metal string
        const osc1 = audioCtx.createOscillator();
        const osc2 = audioCtx.createOscillator();
        const osc3 = audioCtx.createOscillator();
        
        osc1.setPeriodicWave(window.tanpuraWave);
        osc2.setPeriodicWave(window.tanpuraWave);
        osc3.setPeriodicWave(window.tanpuraWave);
        
        // Micro-detuning creates an organic acoustic warmth 
        osc1.frequency.value = freq;
        osc2.frequency.value = freq * 1.0012;
        osc3.frequency.value = freq * 0.9988;

        const mixGain = audioCtx.createGain();
        mixGain.gain.value = 0.33; // Prevent clipping
        
        osc1.connect(mixGain);
        osc2.connect(mixGain);
        osc3.connect(mixGain);

        // Acoustic Body and Natural String Decay Filters
        const bodyFilter = audioCtx.createBiquadFilter(); 
        bodyFilter.type = 'peaking';
        
        const stringLowpass = audioCtx.createBiquadFilter(); 
        stringLowpass.type = 'lowpass';

        const panner = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : audioCtx.createPanner();
        const envGain = audioCtx.createGain();

        let lpStartFreq, lpEndFreq, decayTime;

        if (toneType === 'rich') {
            bodyFilter.frequency.value = freq * 3; bodyFilter.Q.value = 1.2; bodyFilter.gain.value = 4;
            lpStartFreq = freq * 16; lpEndFreq = freq * 2.5; decayTime = 18.0; 
        } else if (toneType === 'mellow') {
            bodyFilter.frequency.value = freq * 2.5; bodyFilter.Q.value = 1.0; bodyFilter.gain.value = 2;
            lpStartFreq = freq * 10; lpEndFreq = freq * 1.8; decayTime = 16.0;
        } else { // deep
            bodyFilter.frequency.value = freq * 2; bodyFilter.Q.value = 0.8; bodyFilter.gain.value = 1;
            lpStartFreq = freq * 6; lpEndFreq = freq * 1.2; decayTime = 14.0;
        }

        mixGain.connect(bodyFilter);
        bodyFilter.connect(stringLowpass);
        stringLowpass.connect(panner);
        panner.connect(envGain);
        
        envGain.connect(masterGain); 
        envGain.connect(reverbGain); // Feed into global stereo space
        
        if(panner.pan) {
            panner.pan.value = panValue; 
        } else { 
            panner.setPosition(panValue, 0, 1 - Math.abs(panValue)); 
        }

        // Smooth Acoustic Filter Decay (The natural closing of the Jivari sound)
        stringLowpass.Q.value = 0.7; 
        stringLowpass.frequency.setValueAtTime(lpStartFreq, startTime);
        stringLowpass.frequency.linearRampToValueAtTime(lpStartFreq * 1.1, startTime + 0.15); // Tiny bloom
        stringLowpass.frequency.exponentialRampToValueAtTime(lpEndFreq, startTime + decayTime * 0.7); 

        // Acoustic Amplitude Envelope
        envGain.gain.setValueAtTime(0, startTime);
        envGain.gain.linearRampToValueAtTime(1, startTime + 0.12); // Soft finger pluck
        envGain.gain.exponentialRampToValueAtTime(0.5, startTime + 2.5); // Initial tension drop
        envGain.gain.exponentialRampToValueAtTime(0.001, startTime + decayTime); // Long trailing tail

        // Organic volume modulation to simulate string beating against the bridge
        const volModOsc = audioCtx.createOscillator();
        volModOsc.frequency.value = 0.5 + (Math.random() * 0.5); 
        const volModDepth = audioCtx.createGain();
        volModDepth.gain.value = 0.04; 
        volModOsc.connect(volModDepth);
        volModDepth.connect(envGain.gain);

        osc1.start(startTime); osc2.start(startTime); osc3.start(startTime); volModOsc.start(startTime);
        osc1.stop(startTime + decayTime); osc2.stop(startTime + decayTime); osc3.stop(startTime + decayTime); volModOsc.stop(startTime + decayTime);
    
        osc1.onended = () => {
            mixGain.disconnect();
            bodyFilter.disconnect();
            stringLowpass.disconnect();
            panner.disconnect();
            envGain.disconnect();
            volModOsc.disconnect();
            volModDepth.disconnect();
        };

    }

    function schedulerLoop() {
        if (!isPlaying) return;
        
        while (nextNoteTime < audioCtx.currentTime + 1.5) {
            
            const rawBaseFreq = currentBaseFreq;
            const octaveMult = parseFloat(octaveOptions[octaveIdx].val);
            const tuneRatio = masterTuneVal / 440;
            
            const saFreq = rawBaseFreq * octaveMult * tuneRatio;
            const firstStringMode = fsOptions[fsIdx].val;
            const middleStringMode = msOptions[msIdx].val;
            const midFreq = saFreq * ratios[middleStringMode];

            const stringFreqs = [ saFreq * ratios[firstStringMode], midFreq, midFreq, saFreq * 0.5 ];

            playStringScheduled(stringFreqs[currentString], pans[currentString], nextNoteTime);

            const cycleDuration = 240000 / currentTempo; 
            const style = rhythmOptions[rhythmIdx].val;
            
            let rhythmDelays;
            if (style === 'even') rhythmDelays = [1, 1, 1, 1];
            else if (style === 'fast') rhythmDelays = [0.8, 0.8, 0.8, 1.2];
            else rhythmDelays = [1, 1, 1, 2]; 

            const delaySeconds = (rhythmDelays[currentString] * (cycleDuration / 5)) / 1000;
            
            nextNoteTime += delaySeconds;
            currentString = (currentString + 1) % 4;
        }
        timerID = setTimeout(schedulerLoop, 25);
    }

    function setupMediaSession() {
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: 'Tanpura Drone', artist: 'Pocket Tanpura', artwork: [{ src: 'icon-192.png', sizes: '192x192', type: 'image/png' }]
            });
            navigator.mediaSession.setActionHandler('play', () => { if(!isPlaying) document.getElementById('playBtn').click(); });
            navigator.mediaSession.setActionHandler('pause', () => { if(isPlaying) document.getElementById('playBtn').click(); });
            try { navigator.mediaSession.setActionHandler('stop', () => { if(isPlaying) document.getElementById('playBtn').click(); }); } catch(e) {}
        }
    }

    async function updateSpeakerInfo() {
        const infoDiv = document.getElementById('speakerInfo');
        const nameSpan = document.getElementById('speakerName');
        if (!isPlaying) {
            infoDiv.style.opacity = '0';
            return;
        }
        
        try {
            if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) throw new Error("Not supported");
            const devices = await navigator.mediaDevices.enumerateDevices();
            const audioOutputs = devices.filter(d => d.kind === 'audiooutput');
            
            let label = 'Default Device';
            if (audioOutputs.length > 0) {
                const activeOutput = audioOutputs.find(d => d.deviceId === 'default') || audioOutputs[0];
                if (activeOutput && activeOutput.label) {
                    label = activeOutput.label;
                }
            }
            nameSpan.innerText = label;
            infoDiv.style.opacity = '1';
        } catch (err) {
            nameSpan.innerText = 'Active Speaker';
            infoDiv.style.opacity = '1';
        }
    }

    document.getElementById('playBtn').addEventListener('click', async () => {
        initAudio();
        
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        const btn = document.getElementById('playBtn');

        if (isPlaying) {
            isPlaying = false;
            clearTimeout(timerID);
            
            // Haptic feedback when stop is pressed
            if (navigator.vibrate) {
                navigator.vibrate(100); 
            }

            if (wakeLock !== null) {
                wakeLock.release().then(() => { wakeLock = null; }).catch(()=>{});
            }

            if (masterGain && audioCtx) {
                masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
                masterGain.gain.setValueAtTime(masterGain.gain.value, audioCtx.currentTime);
                masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
            }
            
            btn.querySelector('.btn-icon').innerText = '▶';
            btn.querySelector('.btn-text').innerText = 'Play';
            btn.classList.remove('playing');
            
            // Pause the native element
            nativeAudioElement.pause();
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
            
            updateSpeakerInfo();
        } else {
            // Haptic feedback when play is pressed
            if (navigator.vibrate) {
                navigator.vibrate(100); 
            }

            if ('wakeLock' in navigator) {
                navigator.wakeLock.request('screen').then(wl => { wakeLock = wl; }).catch(e => console.log('Wake Lock error:', e));
            }

            isPlaying = true;
            currentString = 0;
            nextNoteTime = audioCtx.currentTime + 0.05; 
            
            if (masterGain && audioCtx) {
                masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
                masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
                masterGain.gain.linearRampToValueAtTime(SAFE_MASTER_VOL, audioCtx.currentTime + 0.1);
            }
            
            resizeCanvas(); 
            
            btn.querySelector('.btn-icon').innerText = '⏹';
            btn.querySelector('.btn-text').innerText = 'Stop';
            btn.classList.add('playing');
            
            // Play the native element to trigger OS Media Controls
            nativeAudioElement.play().catch(e => console.log('Media play prevented', e));
            setupMediaSession();
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
            
            schedulerLoop();
            updateSpeakerInfo();
        }
    });

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(() => {}); });
    }
</script>
