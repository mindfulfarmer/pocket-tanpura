<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pocket Tanpura</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1105">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pocket Tanpura">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        /* Dark Mode (Base) - Aligned to Golden/Brown Logo */
        :root {
            --bg-base: #1a1105; 
            --shape-1: #c59b27; 
            --shape-2: #8c5a19; 
            --glass-bg: transparent; 
            --glass-border: transparent; 
            --text-color: #fdf5e6;
            --text-muted: #d4b895;
            --accent-color: #d4af37; 
            --control-bg: rgba(0, 0, 0, 0.4);
            --control-border: rgba(212, 175, 55, 0.2);
            
            /* Engraved variables */
            --engrave-shadow: rgba(0, 0, 0, 0.95);
            --engrave-highlight: rgba(255, 255, 255, 0.12);
            
            /* 3D Button Depth */
            --btn-depth-color: #8b6914; 
            --btn-playing-depth: #641e16;

            --audio-intensity: 0; 
        }

        /* Light Mode - Aligned to Golden/Brown Logo */
        [data-theme="light"] {
            --bg-base: #fdf8f0; 
            --shape-1: #e8c37d; 
            --shape-2: #d4a373; 
            --glass-bg: transparent; 
            --glass-border: transparent; 
            --text-color: #3b2818;
            --text-muted: #735942;
            --accent-color: #b8860b; 
            --control-bg: rgba(255, 255, 255, 0.5);
            --control-border: rgba(184, 134, 11, 0.2);
            
            /* Engraved variables */
            --engrave-shadow: rgba(0, 0, 0, 0.2);
            --engrave-highlight: rgba(255, 255, 255, 0.9);

            /* 3D Button Depth */
            --btn-depth-color: #8b6508;
            --btn-playing-depth: #7b241c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overscroll-behavior-y: none;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh; 
            width: 100vw;
            overflow: hidden; 
            padding: 10px;
            position: relative;
            transition: background-color 0.4s ease;
        }

        /* --- BACKGROUND LAYER --- */
        .bg-anim-layer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -2; overflow: hidden;
        }

        .drift-container { position: absolute; width: 100%; height: 100%; }
        
        .mover1 { animation: drift1 20s infinite alternate ease-in-out; }
        .mover2 { animation: drift2 25s infinite alternate-reverse ease-in-out; }
        .mover3 { animation: drift3 15s infinite alternate ease-in-out; }

        @keyframes drift1 { 0% { transform: translate(-5vw, -5vh) rotate(0deg); } 100% { transform: translate(25vw, 15vh) rotate(45deg); } }
        @keyframes drift2 { 0% { transform: translate(5vw, 5vh) rotate(0deg); } 100% { transform: translate(-20vw, -15vh) rotate(-30deg); } }
        @keyframes drift3 { 0% { transform: translate(0vw, 10vh); } 100% { transform: translate(-15vw, -20vh); } }

        .bg-shape {
            position: absolute;
            border-radius: 50%;
            transform: scale(calc(1 + var(--audio-intensity) * 0.8));
            transition: transform 0.08s ease-out, opacity 0.08s ease-out;
        }

        .shape1 { 
            width: 65vw; height: 65vw; min-width: 450px; min-height: 450px;
            background: var(--shape-1); filter: blur(90px);
            top: -15%; left: -15%; 
            opacity: calc(0.35 + (var(--audio-intensity) * 0.5));
        }
        
        .shape2 { 
            width: 75vw; height: 75vw; min-width: 500px; min-height: 500px;
            background: var(--shape-2); filter: blur(100px);
            bottom: -20%; right: -15%; 
            opacity: calc(0.25 + (var(--audio-intensity) * 0.6));
        }
        
        .shape3 { 
            width: 50vw; height: 50vw; min-width: 350px; min-height: 350px;
            background: var(--accent-color); filter: blur(120px);
            top: 25%; left: 25%;
            opacity: calc(0.05 + (var(--audio-intensity) * 0.8));
            transform: scale(calc(0.8 + var(--audio-intensity) * 1.5));
        }

        .bg-vignette {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, transparent 20%, rgba(0,0,0,0.9) 150%);
            z-index: -1; pointer-events: none; transition: background 0.4s ease;
        }
        [data-theme="light"] .bg-vignette {
            background: radial-gradient(circle at center, transparent 20%, rgba(255,255,255,0.75) 150%);
        }

        /* App Container */
        .app-container {
            width: 100%;
            max-width: 420px;
            height: 96dvh; 
            display: flex;
            flex-direction: column;
            padding: 2vh 1.25rem; 
            z-index: 1;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            padding-bottom: 1.5vh;
        }

        /* --- TRUE ENGRAVED STAMP LOGO --- */
        h1 { 
            font-weight: 900; 
            letter-spacing: 1.5px; 
            font-size: 1.05rem; /* Smaller, stamped look */
            text-transform: uppercase;
            cursor: pointer; 
            /* Color exact match to background to sink it into the material */
            color: var(--control-border); 
            /* Dark shadow top-left, Light highlight bottom-right simulates a physical engraving */
            text-shadow: 
                -1px -1px 2px var(--engrave-shadow),
                 1px  1px 1px var(--engrave-highlight);
            opacity: 0.9; 
            transition: color 0.4s ease, text-shadow 0.4s ease;
        }

        /* Top Right Menu Toggle */
        .icon-btn {
            background: transparent;
            border: none;
            color: var(--accent-color);
            border-radius: 50%;
            width: 38px; height: 38px;
            font-size: 1.6rem;
            cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            transition: transform 0.2s, color 0.2s;
        }
        .icon-btn:active { transform: scale(0.85); }

        /* --- PERFECTLY EVEN FLEX SPACING AREA --- */
        .controls-scroll {
            display: flex;
            flex-direction: column;
            overflow: hidden; 
            flex-grow: 1;
            /* Mathematically spaces every child element perfectly equally */
            justify-content: space-evenly; 
            gap: 1vh; /* Safety gap for tiny screens */
        }

        /* Force strictly zero margins on direct children to allow flexbox to do 100% of the spacing */
        .controls-scroll > * {
            margin-top: 0 !important;
            margin-bottom: 0 !important;
            flex-shrink: 1;
        }

        .control-group.inline-flex { display: flex; align-items: center; gap: 12px; }
        .control-group.inline-flex > * { flex: 1; }
        
        label { 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.85rem; 
            margin-bottom: 8px; /* Comfortable padding between label and button */
            font-weight: 600; 
            color: var(--text-color);
        }
        .val-display { color: var(--accent-color); font-weight: bold; font-variant-numeric: tabular-nums; }

        /* Increased and Uniform Select Heights */
        select, .settings-theme-btn {
            width: 100%; 
            background: var(--control-bg); 
            color: var(--text-color);
            border: 1px solid var(--control-border); 
            height: 54px; /* Explicit and robust uniform height */
            padding: 0 10px; 
            border-radius: 12px;
            font-size: 0.95rem; 
            outline: none; 
            backdrop-filter: blur(5px);
            appearance: none; 
            -webkit-appearance: none;
            text-align: center; 
            font-weight: 600; 
            cursor: pointer; 
            color: var(--accent-color);
            transition: background 0.2s;
        }
        select option { background: var(--bg-base); color: var(--text-color); text-align: center; }

        /* Sliders */
        .slider-wrapper { position: relative; margin-bottom: 0.5vh; }
        input[type=range] { 
            width: 100%; -webkit-appearance: none; padding: 0; height: 26px; 
            background: transparent; border: none; outline: none; z-index: 2; position: relative;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%;
            background: var(--accent-color); cursor: pointer; margin-top: -8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 5px; background: var(--control-border); border-radius: 3px; }
        
        .ticks { 
            display: flex; justify-content: space-between; padding: 0 8px; 
            margin-top: -12px; pointer-events: none; z-index: 1; position: relative; opacity: 0.6;
        }
        .ticks span { width: 2px; height: 6px; background: var(--text-muted); border-radius: 1px; }

        /* --- VISUALIZER --- */
        .visualizer-card {
            background: var(--control-bg); border: 1px solid var(--control-border);
            border-radius: 16px; 
            padding: 18px 16px; 
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
        }
        .visualizer {
            display: flex; justify-content: space-evenly; 
            height: 6vh; 
            min-height: 45px; 
            align-items: center; margin-bottom: 1.5vh;
        }
        .string { width: 3px; height: 100%; background: var(--control-border); border-radius: 2px; }
        
        @keyframes pluckVibrate {
            0% { transform: scaleX(1); background: var(--control-border); }
            10% { transform: scaleX(3) translateX(2px); background: var(--accent-color); box-shadow: 0 0 15px var(--accent-color); }
            20% { transform: scaleX(2.5) translateX(-2px); }
            30% { transform: scaleX(3) translateX(1px); }
            40% { transform: scaleX(2) translateX(-1px); }
            60% { transform: scaleX(2.5) translateX(0); background: var(--accent-color); box-shadow: 0 0 10px var(--accent-color); }
            100% { transform: scaleX(1); background: var(--control-border); box-shadow: none; }
        }
        .string.active { animation: pluckVibrate 0.8s ease-out forwards; }

        /* --- 3D RUBBER PLAY BUTTON --- */
        .play-btn {
            width: 90%; 
            align-self: center;
            height: 75px; 
            min-height: 75px;
            font-size: 1.4rem; 
            letter-spacing: 1px;
            font-weight: 800; 
            color: #fff;
            
            background-color: var(--accent-color); 
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="1.2" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23n)" opacity="0.15"/></svg>');
            
            border: none; 
            border-radius: 16px;
            cursor: pointer; 
            
            box-shadow: 0 8px 0 var(--btn-depth-color);
            transform: translateY(0);
            
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.1s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s;
            
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        
        .play-btn:active { 
            transform: translateY(8px); 
            box-shadow: 0 0px 0 var(--btn-depth-color); 
        }
        
        .play-btn.playing { 
            background-color: #c0392b; 
            box-shadow: 0 8px 0 var(--btn-playing-depth);
        }
        
        .play-btn.playing:active { 
            transform: translateY(8px);
            box-shadow: 0 0px 0 var(--btn-playing-depth);
        }

        .btn-icon { font-size: 1.5rem; margin-top: 1px; }

        /* --- UNIFORM HIGH VISIBILITY MODALS --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh;
            background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center;
            z-index: 100; visibility: hidden; opacity: 0;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .modal-overlay.show { visibility: visible; opacity: 1; }
        
        /* Same width constraint for both Modals */
        .modal-content {
            background: var(--bg-base); 
            border: 1px solid var(--control-border);
            border-radius: 16px; 
            padding: 30px 25px;
            text-align: left; color: var(--text-color);
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            position: relative; 
            width: 340px; 
            max-width: 90vw;
            box-sizing: border-box;
        }
        
        .modal-content.credits-center { text-align: center; }
        .modal-content h2 { color: var(--accent-color); margin-bottom: 20px; font-size: 1.5rem; }
        .modal-content p { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 5px; }
        .modal-content .author { margin-top: 15px; color: var(--text-color); font-weight: 600; }
        
        .close-btn {
            position: absolute; top: 10px; right: 15px;
            background: none; border: none; font-size: 2rem;
            color: var(--text-muted); cursor: pointer; transition: color 0.2s;
        }
        .close-btn:hover { color: var(--text-color); }

        .settings-content .control-group { margin-bottom: 20px; }
        .settings-content label { margin-bottom: 10px; }

    </style>
</head>
<body>

<div class="bg-anim-layer">
    <div class="drift-container mover1"><div class="bg-shape shape1"></div></div>
    <div class="drift-container mover2"><div class="bg-shape shape2"></div></div>
    <div class="drift-container mover3"><div class="bg-shape shape3"></div></div>
</div>
<div class="bg-vignette"></div>

<div class="app-container">
    <div class="header-row">
        <h1 id="appLogo">Pocket Tanpura</h1>
        <div class="header-icons">
            <button id="settingsMenuBtn" class="icon-btn" title="Settings">⋮</button>
        </div>
    </div>

    <div class="controls-scroll">
        
        <div class="control-group">
            <label for="pitchSelect">Base Pitch (Sa)</label>
            <select id="pitchSelect">
                <option value="27.50">A0 (Safed 6 / 6 Kattai)</option>
                <option value="29.14">A#0 (Kali 5 / 6.5 Kattai)</option>
                <option value="30.87">B0 (Safed 7 / 7 Kattai)</option>
                <option value="32.70" selected>C1 (Safed 1 / 1 Kattai)</option>
                <option value="34.65">C#1 (Kali 1 / 1.5 Kattai)</option>
                <option value="36.71">D1 (Safed 2 / 2 Kattai)</option>
                <option value="38.89">D#1 (Kali 2 / 2.5 Kattai)</option>
                <option value="41.20">E1 (Safed 3 / 3 Kattai)</option>
                <option value="43.65">F1 (Safed 4 / 4 Kattai)</option>
                <option value="46.25">F#1 (Kali 3 / 4.5 Kattai)</option>
                <option value="49.00">G1 (Safed 5 / 5 Kattai)</option>
                <option value="51.91">G#1 (Kali 4 / 5.5 Kattai)</option>
                <option value="55.00">A1 (Safed 6 / 6 Kattai)</option>
                <option value="58.27">A#1 (Kali 5 / 6.5 Kattai)</option>
                <option value="61.74">B1 (Safed 7 / 7 Kattai)</option>
                <option value="65.41">C2 (Safed 1 / 1 Kattai)</option>
            </select>
        </div>

        <div class="control-group inline-flex">
            <div>
                <label for="fsSelect">First String</label>
                <select id="fsSelect">
                    <option value="Pa_lower" selected>Mandra Pancham (Pa 5th)</option>
                    <option value="Ma_lower">Mandra Madhyam (Ma 4th)</option>
                    <option value="Ni_lower">Mandra Nishad (Ni 7th)</option>
                </select>
            </div>
            <div>
                <label for="msSelect">Middle Strings</label>
                <select id="msSelect">
                    <option value="Sa" selected>Shuddha Shadja (Sa Root)</option>
                    <option value="Re_komal">Komal Rishabh (k. Re)</option>
                    <option value="Re">Shuddha Rishabh (S. Re)</option>
                    <option value="Ga_komal">Komal Gandhar (k. Ga)</option>
                    <option value="Ga">Shuddha Gandhar (S. Ga)</option>
                    <option value="Ma">Shuddha Madhyam (S. Ma)</option>
                    <option value="Ni">Shuddha Nishad (S. Ni)</option>
                </select>
            </div>
        </div>

        <div class="control-group">
            <label for="octaveSelect">Tanpura Octave</label>
            <select id="octaveSelect">
                <option value="1">Kharaj / Deep Bass (x1)</option>
                <option value="2">Mandra / Standard Male (x2)</option>
                <option value="4" selected>Madhya / Standard Female (x4)</option>
                <option value="8">Taar / High Soprano (x8)</option>
            </select>
        </div>

        <div class="control-group inline-flex">
            <div>
                <label for="pluckStyle">Pluck Style</label>
                <select id="pluckStyle">
                    <option value="standard" selected>Authentic Rhythm</option>
                    <option value="even">Continuous Even</option>
                    <option value="fast">Urgent Fast</option>
                </select>
            </div>
            <div>
                <label for="toneSelect">Synthesis Tone</label>
                <select id="toneSelect">
                    <option value="rich" selected>Rich Harmonic</option>
                    <option value="mellow">Mellow Soft</option>
                    <option value="deep">Deep Acoustic</option>
                </select>
            </div>
        </div>

        <div class="visualizer-card">
            <div class="visualizer">
                <div class="string" id="str0"></div>
                <div class="string" id="str1"></div>
                <div class="string" id="str2"></div>
                <div class="string" id="str3"></div>
            </div>
            <div class="control-group">
                <label for="speedSlider">Pluck Speed <span class="val-display" id="speedDisplay">50 BPM</span></label>
                <div class="slider-wrapper">
                    <input type="range" id="speedSlider" min="30" max="130" value="50" step="1">
                    <div class="ticks">
                        <span></span><span></span><span></span><span></span><span></span>
                    </div>
                </div>
            </div>
        </div>
        
        <button id="playBtn" class="play-btn">
            <span class="btn-icon">▶</span> <span class="btn-text">Play</span>
        </button>
    </div>
</div>

<div id="settingsModal" class="modal-overlay">
    <div class="modal-content settings-content">
        <button id="closeSettingsModal" class="close-btn">&times;</button>
        <h2>Settings</h2>
        
        <div class="control-group">
            <label>App Theme</label>
            <button id="themeToggle" class="settings-theme-btn">Auto 🌓</button>
        </div>

        <div class="control-group" style="margin-top: 25px;">
            <label for="masterTune">Master Tune <span class="val-display" id="tuneDisplay">440 Hz</span></label>
            <div class="slider-wrapper">
                <input type="range" id="masterTune" min="432" max="448" value="440" step="1">
                <div class="ticks">
                    <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
                </div>
            </div>
        </div>

        <div class="control-group">
            <label for="volSlider">Master Volume <span class="val-display" id="volDisplay">70%</span></label>
            <div class="slider-wrapper">
                <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.7">
                <div class="ticks">
                    <span></span><span></span><span></span><span></span><span></span>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="creditsModal" class="modal-overlay">
    <div class="modal-content credits-center">
        <button id="closeCreditsModal" class="close-btn">&times;</button>
        <h2>Pocket Tanpura</h2>
        <p>Version 1.0</p>
        <p class="author">Designed by Bhaskarjyoti Das</p>
        <br><br>
        <p>Made in India 🇮🇳</p>
    </div>
</div>

<script>
    // --- UI Listeners & Updates ---
    const speedSlider = document.getElementById('speedSlider');
    const speedDisplay = document.getElementById('speedDisplay');
    const masterTune = document.getElementById('masterTune');
    const tuneDisplay = document.getElementById('tuneDisplay');
    const volSlider = document.getElementById('volSlider');
    const volDisplay = document.getElementById('volDisplay');

    function updateLabels() {
        speedDisplay.innerText = `${speedSlider.value} BPM`;
        tuneDisplay.innerText = `${masterTune.value} Hz`;
        volDisplay.innerText = `${Math.round(volSlider.value * 100)}%`;
    }

    speedSlider.addEventListener('input', updateLabels);
    masterTune.addEventListener('input', updateLabels);
    volSlider.addEventListener('input', updateLabels);

    // --- State & Storage ---
    const settingsControls = ['pitchSelect', 'fsSelect', 'msSelect', 'octaveSelect', 'pluckStyle', 'toneSelect', 'masterTune', 'speedSlider', 'volSlider'];

    function saveSettings() {
        settingsControls.forEach(id => {
            const el = document.getElementById(id);
            if (el) localStorage.setItem('tanpura_' + id, el.value);
        });
    }

    function loadSettings() {
        settingsControls.forEach(id => {
            const val = localStorage.getItem('tanpura_' + id);
            const el = document.getElementById(id);
            if (val !== null && el) {
                el.value = val;
            }
        });
        updateLabels(); 
    }

    settingsControls.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
            el.addEventListener('change', saveSettings);
            if (el.type === 'range') el.addEventListener('input', saveSettings);
        }
    });

    document.addEventListener('DOMContentLoaded', loadSettings);

    // --- Dynamic Theme Logic ---
    const themes = ['auto', 'light', 'dark'];
    const themeIcons = { 'auto': 'System Auto 🌓', 'light': 'Light Mode ☀️', 'dark': 'Dark Mode 🌙' };
    let currentTheme = localStorage.getItem('tanpura-theme') || 'auto';

    function applyTheme(theme) {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (theme === 'light' || (theme === 'auto' && !prefersDark)) {
            document.body.setAttribute('data-theme', 'light');
            document.querySelector('meta[name="theme-color"]').setAttribute('content', '#fdf8f0');
        } else {
            document.body.removeAttribute('data-theme');
            document.querySelector('meta[name="theme-color"]').setAttribute('content', '#1a1105');
        }
        document.getElementById('themeToggle').innerText = themeIcons[theme];
        localStorage.setItem('tanpura-theme', theme);
    }

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        if (currentTheme === 'auto') applyTheme('auto');
    });

    document.getElementById('themeToggle').addEventListener('click', () => {
        let idx = themes.indexOf(currentTheme);
        currentTheme = themes[(idx + 1) % themes.length];
        applyTheme(currentTheme);
    });

    applyTheme(currentTheme);

    // --- Modal Logic ---
    const creditsModal = document.getElementById('creditsModal');
    const settingsModal = document.getElementById('settingsModal');
    
    // Credits
    document.getElementById('appLogo').addEventListener('click', () => creditsModal.classList.add('show'));
    document.getElementById('closeCreditsModal').addEventListener('click', () => creditsModal.classList.remove('show'));
    creditsModal.addEventListener('click', (e) => { if (e.target === creditsModal) creditsModal.classList.remove('show'); });

    // Settings
    document.getElementById('settingsMenuBtn').addEventListener('click', () => settingsModal.classList.add('show'));
    document.getElementById('closeSettingsModal').addEventListener('click', () => settingsModal.classList.remove('show'));
    settingsModal.addEventListener('click', (e) => { if (e.target === settingsModal) settingsModal.classList.remove('show'); });


    // --- Core Audio Synthesis Engine ---
    let audioCtx, masterGain, analyser, dataArray;
    let isPlaying = false, timerID;
    let nextNoteTime = 0.0;
    let currentString = 0;
    
    const ratios = { 
        'Pa_lower': 0.75, 'Ma_lower': 0.6666, 'Ni_lower': 0.9375, 
        'Sa': 1.0, 'Re_komal': 1.0666, 'Re': 1.125, 'Ga_komal': 1.2, 
        'Ga': 1.25, 'Ma': 1.3333, 'Ni': 1.875 
    };

    const pans = [-0.6, 0.4, -0.4, 0.6];

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 128; 
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            masterGain.connect(analyser);
            analyser.connect(audioCtx.destination);
            
            masterGain.gain.value = document.getElementById('volSlider').value;

            const n = 64; 
            const real = new Float32Array(n);
            const imag = new Float32Array(n);
            for (let i = 1; i < n; i++) {
                let amp = 1 / Math.pow(i, 1.4); 
                if (i === 2 || i === 3) amp *= 1.2; 
                if (i >= 5 && i <= 8) amp *= 1.5; 
                if (i >= 12 && i <= 20) amp *= 1.3; 
                real[i] = amp;
            }
            window.tanpuraWave = audioCtx.createPeriodicWave(real, imag);
        }
    }

    document.getElementById('volSlider').addEventListener('input', (e) => {
        if (masterGain) masterGain.gain.value = e.target.value;
    });

    // --- Audio Reactivity Loop ---
    function updateAudioVisuals() {
        if (!isPlaying) {
            document.documentElement.style.setProperty('--audio-intensity', '0');
            return;
        }
        requestAnimationFrame(updateAudioVisuals);
        analyser.getByteFrequencyData(dataArray);
        
        let sum = 0;
        const len = Math.min(dataArray.length, 30); 
        for(let i = 0; i < len; i++) sum += dataArray[i];
        
        let avg = sum / len; 
        let intensity = Math.min(1, avg / 130); 
        
        document.documentElement.style.setProperty('--audio-intensity', intensity.toFixed(3));
    }

    function playStringScheduled(freq, panValue, startTime) {
        if (!audioCtx) return;
        const toneType = document.getElementById('toneSelect').value;

        const oscMain = audioCtx.createOscillator();
        const oscDetune = audioCtx.createOscillator();
        oscMain.setPeriodicWave(window.tanpuraWave);
        oscDetune.setPeriodicWave(window.tanpuraWave);
        
        oscMain.frequency.value = freq;
        oscDetune.frequency.value = freq * 1.002; 

        const mainGain = audioCtx.createGain(); 
        const detuneGain = audioCtx.createGain();
        const bodyFilter = audioCtx.createBiquadFilter(); 
        const jawariFilter = audioCtx.createBiquadFilter(); 
        const panner = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : audioCtx.createPanner();
        const envGain = audioCtx.createGain();

        let jawariPeakMax, jawariEndFreq, decayTime;

        if (toneType === 'rich') {
            mainGain.gain.value = 0.55; detuneGain.gain.value = 0.45;
            bodyFilter.type = 'peaking'; bodyFilter.frequency.value = freq * 4; bodyFilter.Q.value = 1.8; bodyFilter.gain.value = 6;
            jawariFilter.type = 'lowpass'; jawariFilter.Q.value = 1.5;
            jawariPeakMax = freq * 18; jawariEndFreq = freq * 1.5; decayTime = 13.0;
        } else if (toneType === 'mellow') {
            mainGain.gain.value = 0.7; detuneGain.gain.value = 0.3;
            bodyFilter.type = 'peaking'; bodyFilter.frequency.value = freq * 2.5; bodyFilter.Q.value = 1.2; bodyFilter.gain.value = 4;
            jawariFilter.type = 'lowpass'; jawariFilter.Q.value = 0.8;
            jawariPeakMax = freq * 8; jawariEndFreq = freq * 1.2; decayTime = 11.0;
        } else { 
            mainGain.gain.value = 0.85; detuneGain.gain.value = 0.15;
            bodyFilter.type = 'peaking'; bodyFilter.frequency.value = freq * 1.5; bodyFilter.Q.value = 0.8; bodyFilter.gain.value = 2;
            jawariFilter.type = 'lowpass'; jawariFilter.Q.value = 0.4;
            jawariPeakMax = freq * 4; jawariEndFreq = freq * 1.0; decayTime = 9.0;
        }

        oscMain.connect(mainGain); oscDetune.connect(detuneGain);
        mainGain.connect(bodyFilter); detuneGain.connect(bodyFilter);
        bodyFilter.connect(jawariFilter);
        jawariFilter.connect(panner);
        panner.connect(envGain);
        envGain.connect(masterGain);
        
        if(panner.pan) panner.pan.value = panValue; 
        else { panner.setPosition(panValue, 0, 1 - Math.abs(panValue)); }

        jawariFilter.frequency.setValueAtTime(freq * 2, startTime);
        jawariFilter.frequency.linearRampToValueAtTime(jawariPeakMax, startTime + 0.6); 
        jawariFilter.frequency.exponentialRampToValueAtTime(jawariEndFreq, startTime + decayTime); 

        envGain.gain.setValueAtTime(0, startTime);
        envGain.gain.linearRampToValueAtTime(1, startTime + 0.08); 
        envGain.gain.exponentialRampToValueAtTime(0.35, startTime + 0.8); 
        envGain.gain.exponentialRampToValueAtTime(0.0001, startTime + decayTime); 

        oscMain.start(startTime); oscDetune.start(startTime);
        oscMain.stop(startTime + decayTime); oscDetune.stop(startTime + decayTime);
    }

    function schedulerLoop() {
        if (!isPlaying) return;
        
        while (nextNoteTime < audioCtx.currentTime + 1.5) {
            
            const rawBaseFreq = parseFloat(document.getElementById('pitchSelect').value);
            const octaveMult = parseFloat(document.getElementById('octaveSelect').value);
            const tuneRatio = parseFloat(document.getElementById('masterTune').value) / 440;
            
            const saFreq = rawBaseFreq * octaveMult * tuneRatio;
            const firstStringMode = document.getElementById('fsSelect').value;
            const middleStringMode = document.getElementById('msSelect').value;
            const midFreq = saFreq * ratios[middleStringMode];

            const stringFreqs = [ 
                saFreq * ratios[firstStringMode], 
                midFreq,                          
                midFreq,                          
                saFreq * 0.5                      
            ];

            playStringScheduled(stringFreqs[currentString], pans[currentString], nextNoteTime);

            const noteIndex = currentString;
            const uiDelay = (nextNoteTime - audioCtx.currentTime) * 1000;
            
            setTimeout(() => {
                if(!isPlaying) return;
                const stringsUI = document.querySelectorAll('.string');
                stringsUI.forEach(s => s.classList.remove('active'));
                void stringsUI[noteIndex].offsetWidth; 
                stringsUI[noteIndex].classList.add('active');
            }, Math.max(0, uiDelay));

            const bpm = parseInt(document.getElementById('speedSlider').value);
            const cycleDuration = 240000 / bpm; 
            const style = document.getElementById('pluckStyle').value;
            
            let rhythmDelays;
            if (style === 'even') rhythmDelays = [1, 1, 1, 1];
            else if (style === 'fast') rhythmDelays = [0.8, 0.8, 0.8, 1.2];
            else rhythmDelays = [1, 1, 1, 2]; 

            const delaySeconds = (rhythmDelays[currentString] * (cycleDuration / 5)) / 1000;
            
            nextNoteTime += delaySeconds;
            currentString = (currentString + 1) % 4;
        }

        timerID = setTimeout(schedulerLoop, 25);
    }

    document.getElementById('playBtn').addEventListener('click', async () => {
        initAudio();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        const btn = document.getElementById('playBtn');

        if (isPlaying) {
            isPlaying = false;
            clearTimeout(timerID);
            btn.querySelector('.btn-icon').innerText = '▶';
            btn.querySelector('.btn-text').innerText = 'Play';
            btn.classList.remove('playing');
        } else {
            isPlaying = true;
            currentString = 0;
            nextNoteTime = audioCtx.currentTime + 0.05; 
            
            btn.querySelector('.btn-icon').innerText = '⏹';
            btn.querySelector('.btn-text').innerText = 'Stop';
            btn.classList.add('playing');
            
            schedulerLoop();
            updateAudioVisuals(); 
        }
    });

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(() => {});
        });
    }
</script>
